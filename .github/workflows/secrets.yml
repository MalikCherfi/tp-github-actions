name: Demo Secrets

on:
    workflow_dispatch:

jobs:
    demo:
        runs-on: ubuntu-latest

        env:
            API_KEY: ${{ secrets.API_KEY }}

        steps:
            - name: Vérifier que le secret est défini
              run: |
                  if [ -z "$API_KEY" ]; then
                  echo "❌ Le secret API_KEY n'est pas défini"
                  exit 1
                  fi
                    echo "✅ Le secret API_KEY est défini (${#API_KEY} caractères)"
