# dependabot.yml

version: 2

updates:
  # ── Mettre à jour les actions GitHub ──────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  # ── Mettre à jour les dépendances Python ──────────────────────────
  - package-ecosystem: "pip"
    directory: "/ressources"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5

  # ── Mettre à jour les dépendances Node.js ─────────────────────────
  - package-ecosystem: "npm"
    directory: "/ressources-node"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
      - "node"
    open-pull-requests-limit: 5
